# vhost اختصاصی relay روی Apache سرور آلمان (168.222.43.75) — نصب‌شده ۲۰۲۶-۰۷-۲۲.
# دامنه relay.bourssanj.ir (Cloudflare DNS-only → 168.222.43.75). گواهی: certbot certonly --webroot.
# نکته: /etc/gai.conf خط «precedence ::ffff:0:0/96 100» لازم است (IPv6 آلمان به گوگل خراب است).
# مسیر روی سرور: /etc/apache2/sites-available/relay.bourssanj.ir-ssl.conf
<VirtualHost *:443>
    ServerName relay.bourssanj.ir
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/relay.bourssanj.ir/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/relay.bourssanj.ir/privkey.pem

    # relay for bourssanj site on Iran server (45.94.215.115).
    # Google/OpenRouter block Iranian IPs; api.telegram.org is filtered inside Iran.
    SSLProxyEngine on
    ProxyPass /relay/gemini/ https://generativelanguage.googleapis.com/ timeout=90
    ProxyPassReverse /relay/gemini/ https://generativelanguage.googleapis.com/
    ProxyPass /relay/openrouter/ https://openrouter.ai/ timeout=90
    ProxyPassReverse /relay/openrouter/ https://openrouter.ai/
    ProxyPass /relay/telegram/ https://api.telegram.org/ timeout=90
    ProxyPassReverse /relay/telegram/ https://api.telegram.org/
    <Location "/relay/">
        Require ip 45.94.215.115 127.0.0.1
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/relay.bourssanj.ir-error.log
    CustomLog ${APACHE_LOG_DIR}/relay.bourssanj.ir-access.log combined
</VirtualHost>
