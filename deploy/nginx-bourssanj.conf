# nginx vhost برای bourssanj.ir روی سرور ایران — نصب در /etc/nginx/sites-available/ و symlink به sites-enabled
# SSL را certbot --nginx خودش اضافه می‌کند؛ این فایل فقط HTTP اولیه است.
server {
    listen 80;
    listen [::]:80;
    server_name bourssanj.ir www.bourssanj.ir;

    # چارت‌های base64 به chart-narrative می‌روند — پیش‌فرض 1m کم است
    client_max_body_size 8m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # استریم SSE/چانک‌شده‌ی Next نباید بافر شود
        proxy_buffering off;
        proxy_read_timeout 90s;
    }
}
