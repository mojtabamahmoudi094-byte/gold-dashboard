# سقف مصرف دیسک journald — نصب: /etc/systemd/journald.conf.d/bourssanj.conf
# سپس: systemctl restart systemd-journald && journalctl --vacuum-size=500M
# چرا: بات‌ها (bourse-analyst, portfolio bot) لاگشان به journald می‌رود نه فایل، و پیش‌فرض
# journald تا ۱۰٪ دیسک رشد می‌کند (روی سرور آلمان به ۱.۹G رسیده بود). سقف ثابت جلوی پر شدن دیسک را می‌گیرد.
[Journal]
SystemMaxUse=500M
SystemMaxFileSize=50M
MaxRetentionSec=1month
